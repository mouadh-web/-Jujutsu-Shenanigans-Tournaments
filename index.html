<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Jujutsu Shenanigans Tournament</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0b1120;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#c084fc;
      font-size:40px;
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    .card{
      background:#111827;
      border:1px solid #312e81;
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;
    }

    h2{
      margin-bottom:15px;
      color:#a855f7;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      background:#1f2937;
      color:white;
      font-size:16px;
    }

    button{
      border:none;
      border-radius:10px;
      padding:10px 15px;
      cursor:pointer;
      font-weight:bold;
      margin-top:10px;
      transition:0.2s;
    }

    .purple{
      background:#7c3aed;
      color:white;
    }

    .purple:hover{
      background:#6d28d9;
    }

    .green{
      background:#16a34a;
      color:white;
    }

    .green:hover{
      background:#15803d;
    }

    .red{
      background:#dc2626;
      color:white;
    }

    .red:hover{
      background:#b91c1c;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:15px;
    }

    th,td{
      border:1px solid #374151;
      padding:12px;
      text-align:center;
    }

    th{
      background:#1f2937;
    }

    .match{
      background:#0f172a;
      border-left:5px solid #a855f7;
      padding:15px;
      border-radius:12px;
      margin-top:15px;
    }

    .manager-only{
      display:none;
    }

    .top{
      color:#facc15;
      font-weight:bold;
    }

    .footer{
      text-align:center;
      margin-top:30px;
      opacity:0.7;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>⚔️ Jujutsu Shenanigans Tournament</h1>

  <div class="card">

    <h2>Join Tournament</h2>

    <input
      type="text"
      id="playerName"
      placeholder="Your Roblox Username"
    >

    <input
      type="number"
      step="0.25"
      id="playerTimezone"
      placeholder="UTC Timezone Example: -5, 1, 3.5"
    >

    <button class="purple" onclick="joinTournament()">
      Join Tournament
    </button>

  </div>



  <div class="card">

    <h2>Manager Login</h2>

    <input
      type="password"
      id="managerPassword"
      placeholder="Manager Password"
    >

    <button class="purple" onclick="managerLogin()">
      Enter Manager Mode
    </button>

  </div>



  <div class="card">

    <h2>Leaderboard</h2>

    <table>

      <thead>

        <tr>
          <th>Rank</th>
          <th>Player</th>
          <th>Timezone</th>
          <th>Wins</th>
          <th>Losses</th>

          <th class="manager-only">
            Actions
          </th>
        </tr>

      </thead>

      <tbody id="playersTable"></tbody>

    </table>

  </div>


  <div class="card manager-only" id="matchesCard">

    <h2>Closest Timezone Matches</h2>

    <button class="purple" onclick="generateMatches()">
      Generate Matches
    </button>

    <div id="matches"></div>

  </div>


  <div class="footer">
    Jujutsu Shenanigans Community Tournament
  </div>

</div>


<script>

  const MANAGER_PASSWORD = "irrelevant";



  let players = JSON.parse(
    localStorage.getItem("jjk_players")
  ) || [];

  let isManager = false;



  function savePlayers(){

    localStorage.setItem(
      "jjk_players",
      JSON.stringify(players)
    );

  }


  function joinTournament(){

    const name = document
      .getElementById("playerName")
      .value
      .trim();

    const timezone = parseFloat(
      document.getElementById("playerTimezone").value
    );

    if(!name){
      alert("Enter your username.");
      return;
    }

    if(
      isNaN(timezone) ||
      timezone < -12 ||
      timezone > 14
    ){
      alert("Timezone must be between -12 and +14.");
      return;
    }

    const exists = players.some(
      p => p.name.toLowerCase() === name.toLowerCase()
    );

    if(exists){
      alert("This username already joined.");
      return;
    }

    players.push({
      name:name,
      timezone:timezone,
      wins:0,
      losses:0
    });

    savePlayers();

    renderPlayers();

    document.getElementById("playerName").value = "";
    document.getElementById("playerTimezone").value = "";

    alert("You joined the tournament!");

  }


  function managerLogin(){

    const password = document
      .getElementById("managerPassword")
      .value;

    if(password === MANAGER_PASSWORD){

      isManager = true;

      document
        .querySelectorAll(".manager-only")
        .forEach(el => {
          el.style.display = "table-cell";
        });

      document.getElementById(
        "matchesCard"
      ).style.display = "block";

      renderPlayers();

      alert("Manager mode activated.");

    }
    else{
      alert("Wrong password.");
    }

  }



  function renderPlayers(){

    const table = document.getElementById(
      "playersTable"
    );

    table.innerHTML = "";

    const sortedPlayers = [...players].sort(
      (a,b) => b.wins - a.wins
    );

    sortedPlayers.forEach((player,index) => {

      let rank = index + 1;

      let rankDisplay = rank;

      if(rank === 1){
        rankDisplay = "🥇";
      }
      else if(rank === 2){
        rankDisplay = "🥈";
      }
      else if(rank === 3){
        rankDisplay = "🥉";
      }

      let row = `

        <tr>

          <td class="top">
            ${rankDisplay}
          </td>

          <td>
            ${player.name}
          </td>

          <td>
            UTC${player.timezone >= 0 ? '+' : ''}${player.timezone}
          </td>

          <td>
            ${player.wins}
          </td>

          <td>
            ${player.losses}
          </td>

      `;

      if(isManager){

        row += `

          <td>

            <button
              class="green"
              onclick="addWin('${player.name}')"
            >
              +Win
            </button>

            <button
              class="red"
              onclick="addLoss('${player.name}')"
            >
              +Loss
            </button>

            <button
              class="red"
              onclick="deletePlayer('${player.name}')"
            >
              Delete
            </button>

          </td>

        `;
      }

      row += `</tr>`;

      table.innerHTML += row;

    });

  }



  function addWin(name){

    const player = players.find(
      p => p.name === name
    );

    if(player){

      player.wins++;

      savePlayers();

      renderPlayers();

    }

  }

  function addLoss(name){

    const player = players.find(
      p => p.name === name
    );

    if(player){

      player.losses++;

      savePlayers();

      renderPlayers();

    }

  }


  function deletePlayer(name){

    players = players.filter(
      p => p.name !== name
    );

    savePlayers();

    renderPlayers();

  }


  function generateMatches(){

    const matchesDiv = document.getElementById(
      "matches"
    );

    matchesDiv.innerHTML = "";

    let matches = [];

    for(let i = 0; i < players.length; i++){

      for(let j = i + 1; j < players.length; j++){

        let p1 = players[i];
        let p2 = players[j];

        let diff = Math.abs(
          p1.timezone - p2.timezone
        );

        matches.push({
          p1:p1,
          p2:p2,
          diff:diff
        });

      }

    }

    matches.sort((a,b) => a.diff - b.diff);

    matches.forEach(match => {

      matchesDiv.innerHTML += `

        <div class="match">

          <h3>
            ${match.p1.name}
            VS
            ${match.p2.name}
          </h3>

          <p>
            UTC${match.p1.timezone >= 0 ? '+' : ''}${match.p1.timezone}
            ↔
            UTC${match.p2.timezone >= 0 ? '+' : ''}${match.p2.timezone}
          </p>

          <p>
            Time Difference:
            ${match.diff} hour(s)
          </p>

        </div>

      `;

    });

  }


  renderPlayers();

</script>

</body>
</html>
